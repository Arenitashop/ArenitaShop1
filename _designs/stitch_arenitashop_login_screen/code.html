<!DOCTYPE html>

<html class="light" lang="es"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fff8f3; /* Warm Sand */
        }
        .coral-gradient {
            background: linear-gradient(135deg, #e8714a 0%, #a33e1b 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface min-h-screen flex flex-col justify-between antialiased">
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center px-margin pt-xl pb-md w-full max-w-[375px] mx-auto">
<!-- Header / Logo Area -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-primary-fixed mb-sm shadow-sm">
<span class="material-symbols-outlined text-primary text-headline-xl" data-icon="light_mode" style="font-variation-settings: 'FILL' 1;">light_mode</span>
</div>
<h1 class="font-display-lg text-headline-xl text-primary mb-xs tracking-tight italic">ArenitaShop</h1>
<p class="font-label-md text-on-surface-variant">Compra y vende cerca de ti</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-md">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant px-xs" for="email">Correo electrónico</label>
<div class="relative">
<input class="w-full px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-2xl focus:border-secondary focus:ring-4 focus:ring-secondary/5 transition-all outline-none placeholder:text-outline" id="email" placeholder="tu@email.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant px-xs" for="password">Contraseña</label>
<div class="relative">
<input class="w-full px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-2xl focus:border-secondary focus:ring-4 focus:ring-secondary/5 transition-all outline-none placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline-variant hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<div class="text-right">
<a class="font-label-md text-secondary hover:text-on-secondary-container transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
</div>
<!-- Action Button -->
<button class="w-full coral-gradient text-on-primary font-headline-md py-sm rounded-2xl shadow-lg shadow-primary/20 active:scale-95 transition-transform duration-150" type="submit">
                Iniciar Sesión
            </button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-base my-xl">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-md text-outline">o continúa con</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<!-- OAuth Section -->
<div class="w-full">
<button class="w-full flex items-center justify-center gap-sm px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-2xl hover:bg-surface-container transition-colors active:scale-95 duration-150">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCpFvDmR8E4WdH_lI9nmbmJ8s-FgDej9rSEGw2-k3CnqRAYxE5-RpY4wSoa8ZgGOQVQrt6LwPQXa3QB3UXRIiuEFVUBVs0LKuIP5TaZG13P183_beeCdkkPpUOeyCJ6213M5jBQYozH6-J6lDgHUXm4RZU1EKpuqW0C1h2NMyL8Apxd4vornHy72O0iLJ3rZlKY2yUzLjRS_JpIXVMR_KV1Hqg-216g6BxrObQr3u21P_QJxuMAD1ZYWai95lln2zo7vkBvnp5IiM7g"/>
<span class="font-label-md text-on-surface">Continuar con Google</span>
</button>
</div>
</main>
<!-- Bottom Footer Section -->
<footer class="w-full max-w-[375px] mx-auto pb-lg px-margin text-center">
<p class="font-body-md text-on-surface-variant">
            ¿No tienes cuenta? 
            <a class="font-label-md text-primary font-bold hover:underline" href="#">Regístrate</a>
</p>
</footer>
<!-- Subtle background decoration -->
<div class="fixed top-0 right-0 -z-10 opacity-20">
<div class="w-64 h-64 rounded-full bg-primary-fixed blur-3xl -mr-32 -mt-32"></div>
</div>
<div class="fixed bottom-0 left-0 -z-10 opacity-30">
<div class="w-80 h-80 rounded-full bg-secondary-container blur-[100px] -ml-40 -mb-40"></div>
</div>
</body></html>
