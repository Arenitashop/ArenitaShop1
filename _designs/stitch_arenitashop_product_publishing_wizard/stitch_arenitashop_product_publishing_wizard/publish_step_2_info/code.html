<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-high": "#fae4dd",
                    "inverse-primary": "#ffb59c",
                    "on-primary-fixed-variant": "#822800",
                    "error": "#ba1a1a",
                    "secondary-container": "#e5e2dd",
                    "primary": "#a43c12",
                    "on-surface-variant": "#57423b",
                    "tertiary": "#006970",
                    "error-container": "#ffdad6",
                    "on-surface": "#241915",
                    "primary-fixed-dim": "#ffb59c",
                    "primary-fixed": "#ffdbcf",
                    "on-error": "#ffffff",
                    "surface-container-low": "#fff1ec",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#ffede8",
                    "surface-tint": "#a43c12",
                    "surface-dim": "#ebd6cf",
                    "surface-container": "#ffe9e3",
                    "on-background": "#241915",
                    "background": "#fff8f6",
                    "on-secondary-fixed-variant": "#474743",
                    "secondary-fixed": "#e5e2dd",
                    "secondary": "#5f5e5b",
                    "tertiary-container": "#00b5c0",
                    "on-error-container": "#93000a",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#7af4ff",
                    "on-tertiary-fixed": "#002022",
                    "surface": "#fff8f6",
                    "outline": "#8b7169",
                    "surface-container-highest": "#f4ded7",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#4dd9e4",
                    "on-tertiary-fixed-variant": "#004f54",
                    "on-primary-container": "#6c2000",
                    "primary-container": "#ff7f50",
                    "outline-variant": "#dec0b6",
                    "on-primary-fixed": "#380c00",
                    "surface-variant": "#f4ded7",
                    "on-secondary-fixed": "#1c1c19",
                    "surface-bright": "#fff8f6",
                    "inverse-surface": "#3a2e29",
                    "on-secondary-container": "#656461",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#004145",
                    "secondary-fixed-dim": "#c9c6c2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "sm": "8px",
                    "base": "4px",
                    "gutter": "12px",
                    "xl": "32px",
                    "container-margin": "20px",
                    "xs": "4px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "body-lg": ["Plus Jakarta Sans"],
                    "label-md": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "headline-xl": ["Plus Jakarta Sans"],
                    "label-sm": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body { background-color: #F5F2ED; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar Container -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#F5F2ED] dark:bg-stone-950 border-b border-stone-200 dark:border-stone-800 shadow-sm">
<div class="flex justify-between items-center w-full px-5 py-3 h-16">
<div class="flex items-center gap-3">
<button class="transition-colors duration-200 hover:bg-stone-100 dark:hover:bg-stone-800 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-stone-900 dark:text-stone-50" data-icon="close">close</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-semibold text-stone-900 dark:text-stone-50">Publicar producto</h1>
</div>
<div class="flex items-center gap-4">
<span class="font-label-md text-[#FF7F50] dark:text-orange-400">2 de 5</span>
<button class="transition-colors duration-200 hover:bg-stone-100 dark:hover:bg-stone-800 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-stone-500" data-icon="help_outline">help_outline</span>
</button>
</div>
</div>
</header>
<main class="flex-1 mt-16 mb-24 px-container-margin py-lg max-w-2xl mx-auto w-full">
<!-- Progress Bar Section -->
<div class="mb-xl">
<div class="flex justify-between items-end mb-sm">
<h2 class="font-headline-lg text-on-surface">Información básica</h2>
</div>
<div class="h-2 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-[40%] rounded-full transition-all duration-500"></div>
</div>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-2xl shadow-[0_4px_15px_rgba(0,0,0,0.04)] p-6 space-y-lg">
<!-- Product Title -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant" for="product-title">Título del producto</label>
<div class="relative">
<input class="w-full bg-[#F5F2ED] border border-[#E0DDD8] focus:border-[#FF7F50] focus:ring-0 rounded-xl px-4 py-3 font-body-md text-on-surface transition-colors" id="product-title" placeholder="Ej. iPhone 13 Pro Max" type="text" value="iPhone 12 Pro 256GB"/>
<div class="flex justify-end mt-1">
<span class="font-label-sm text-outline">28/80</span>
</div>
</div>
</div>
<!-- Description -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant" for="description">Descripción</label>
<div class="relative">
<textarea class="w-full bg-[#F5F2ED] border border-[#E0DDD8] focus:border-[#FF7F50] focus:ring-0 rounded-xl px-4 py-3 font-body-md text-on-surface transition-colors resize-none" id="description" placeholder="Cuéntanos más sobre tu producto..." rows="4">Vendo iPhone 12 Pro en excelente estado, capacidad de 256GB, color grafito. Siempre usado con funda y protector de pantalla.</textarea>
<div class="flex justify-end mt-1">
<span class="font-label-sm text-outline">120/1000</span>
</div>
</div>
</div>
<!-- Product Status -->
<div class="space-y-md">
<label class="font-label-md text-on-surface-variant">Estado del producto</label>
<div class="grid grid-cols-3 gap-sm">
<button class="flex flex-col items-center justify-center py-4 px-2 rounded-xl border-2 border-primary-container bg-surface-container-low transition-all active:scale-95">
<span class="material-symbols-outlined text-primary mb-1" data-icon="new_releases" data-weight="fill" style="font-variation-settings: 'FILL' 1;">new_releases</span>
<span class="font-label-md text-primary">Nuevo</span>
</button>
<button class="flex flex-col items-center justify-center py-4 px-2 rounded-xl border border-outline-variant bg-transparent hover:bg-surface-container-low transition-all active:scale-95">
<span class="material-symbols-outlined text-outline mb-1" data-icon="history">history</span>
<span class="font-label-md text-on-surface-variant">Usado</span>
</button>
<button class="flex flex-col items-center justify-center py-4 px-2 rounded-xl border border-outline-variant bg-transparent hover:bg-surface-container-low transition-all active:scale-95">
<span class="material-symbols-outlined text-outline mb-1" data-icon="build">build</span>
<span class="font-label-md text-on-surface-variant text-center">Reacondicionado</span>
</button>
</div>
</div>
<!-- Visual Decorative Element (Contextual) -->
<div class="pt-4 border-t border-surface-container-high">
<div class="flex items-center gap-gutter text-on-surface-variant bg-surface-container-low p-4 rounded-xl">
<span class="material-symbols-outlined text-primary-container" data-icon="lightbulb">lightbulb</span>
<p class="font-label-sm">Un título claro y una descripción detallada ayudan a vender tu producto hasta un 40% más rápido.</p>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Container -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-5 py-4 bg-white dark:bg-stone-900 border-t border-stone-100 dark:border-stone-800 shadow-[0_-4px_15px_rgba(0,0,0,0.04)] rounded-t-2xl">
<button class="flex flex-row items-center justify-center text-stone-600 dark:text-stone-400 px-6 py-3 gap-2 border border-stone-200 dark:border-stone-700 rounded-lg active:scale-95 transition-transform duration-150 font-['Plus_Jakarta_Sans'] font-medium text-sm hover:opacity-90">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
            Atrás
        </button>
<button class="flex flex-row items-center justify-center bg-[#FF7F50] text-white rounded-lg px-6 py-3 gap-2 active:scale-95 transition-transform duration-150 font-['Plus_Jakarta_Sans'] font-medium text-sm hover:opacity-90">
            Continuar
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
</body></html>
